<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZHGU Анкета</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#f8f5ef,#f1e0cb);
min-height:100vh;
padding:40px 20px;
overflow-x:hidden;
position:relative;
animation:bgMove 10s ease-in-out infinite alternate;
}

/* BACKGROUND ANIMATION */

@keyframes bgMove{

0%{
background:linear-gradient(135deg,#f8f5ef,#f1e0cb);
}

100%{
background:linear-gradient(135deg,#f5ede1,#ead5bc);
}

}

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:350px;
height:350px;
background:#003ea8;
clip-path:polygon(0 0,100% 0,0 100%);
z-index:-1;
opacity:.95;
}

body::after{
content:"";
position:absolute;
bottom:0;
right:0;
width:350px;
height:350px;
background:#003ea8;
clip-path:polygon(100% 0,100% 100%,0 100%);
z-index:-1;
opacity:.95;
}

/* CONTAINER */

.container{
width:100%;
display:flex;
justify-content:center;
}

/* CARD */

.card{
width:100%;
max-width:1150px;
background:white;
border-radius:34px;
padding:50px;
box-shadow:0 15px 45px rgba(0,0,0,.08);
position:relative;
overflow:hidden;
animation:showCard 1s ease;
}

@keyframes showCard{

from{
opacity:0;
transform:translateY(40px) scale(.96);
}

to{
opacity:1;
transform:translateY(0) scale(1);
}

}

/* FLOATING EFFECTS */

.card::before{
content:"";
position:absolute;
top:-120px;
left:-120px;
width:280px;
height:280px;
background:rgba(0,62,168,.05);
border-radius:50%;
animation:float1 7s ease-in-out infinite;
}

.card::after{
content:"";
position:absolute;
bottom:-100px;
right:-100px;
width:240px;
height:240px;
background:rgba(215,178,140,.16);
border-radius:50%;
animation:float2 9s ease-in-out infinite;
}

@keyframes float1{

50%{
transform:translateY(30px) translateX(20px);
}

}

@keyframes float2{

50%{
transform:translateY(-20px) translateX(-20px);
}

}

/* LOGO */

.topLogo{
display:flex;
justify-content:center;
margin-bottom:20px;
animation:logoShow 1.1s ease;
}

.topLogo img{
width:130px;
height:auto;
filter:drop-shadow(0 10px 20px rgba(0,62,168,.15));
transition:.4s;
}

.topLogo img:hover{
transform:scale(1.05) rotate(-2deg);
}

@keyframes logoShow{

from{
opacity:0;
transform:translateY(-20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* TITLE */

.title{
text-align:center;
font-size:72px;
font-weight:700;
color:#003ea8;
letter-spacing:4px;
margin-bottom:10px;
animation:titleShow 1s ease;
}

@keyframes titleShow{

from{
opacity:0;
transform:translateY(-20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.line{
width:180px;
height:6px;
border-radius:20px;
background:linear-gradient(90deg,#003ea8,#d8b38c);
margin:0 auto 50px;
}

/* SECTION */

.section{
display:flex;
align-items:center;
gap:14px;
margin:40px 0 25px;
}

.sectionLogo img{
width:42px;
height:42px;
object-fit:contain;
}

.section span{
background:#003ea8;
color:white;
padding:12px 24px;
font-size:27px;
font-weight:600;
border-radius:14px 14px 14px 0;
position:relative;
overflow:hidden;
}

.section span::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:rgba(255,255,255,.2);
transform:skewX(-25deg);
animation:shine 4s infinite;
}

@keyframes shine{

100%{
left:200%;
}

}

.sectionLine{
flex:1;
height:3px;
background:#003ea8;
opacity:.25;
}

/* GRIDS */

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:24px;
}

.grid3{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:24px;
margin-top:22px;
}

.addressGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:26px;
margin-top:25px;
}

/* INPUT */

.inputBox{
margin-bottom:20px;
animation:fadeInput .8s ease;
}

@keyframes fadeInput{

from{
opacity:0;
transform:translateY(15px);
}

to{
opacity:1;
transform:translateY(0);
}

}

label{
display:block;
margin-bottom:10px;
font-size:17px;
font-weight:600;
color:#003ea8;
}

input,
select{
width:100%;
padding:17px 18px;
border:2px solid #d7e0f4;
border-radius:16px;
outline:none;
font-size:16px;
background:#fff;
transition:.35s;
color:#222;
}

input::placeholder{
color:#999;
}

input:hover,
select:hover{
transform:translateY(-2px);
border-color:#003ea8;
}

input:focus,
select:focus{
border-color:#003ea8;
box-shadow:0 0 0 5px rgba(0,62,168,.08);
transform:scale(1.02);
}

/* ADDRESS */

.addressCard{
background:#faf7f2;
padding:30px;
border-radius:24px;
border:1px solid #ece4da;
transition:.35s;
}

.addressCard:hover{
transform:translateY(-5px);
box-shadow:0 12px 30px rgba(0,62,168,.08);
}

.addressTitle{
font-size:30px;
font-weight:700;
color:#003ea8;
margin-bottom:24px;
}

/* BUTTON */

button{
width:100%;
margin-top:40px;
padding:22px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#003ea8,#0054d1);
color:white;
font-size:24px;
font-weight:700;
cursor:pointer;
transition:.35s;
position:relative;
overflow:hidden;
}

button::before{
content:"";
position:absolute;
top:0;
left:-120%;
width:120%;
height:100%;
background:rgba(255,255,255,.25);
transform:skewX(-25deg);
transition:.8s;
}

button:hover::before{
left:130%;
}

button:hover{
transform:translateY(-4px) scale(1.01);
box-shadow:0 15px 30px rgba(0,62,168,.25);
}

/* FOOTER */

.footer{
margin-top:25px;
text-align:center;
font-size:15px;
color:#666;
}

/* MOBILE */

@media(max-width:950px){

.title{
font-size:48px;
}

.grid2,
.grid3,
.addressGrid{
grid-template-columns:1fr;
}

.card{
padding:28px;
}

.section span{
font-size:22px;
}

}

</style>
</head>

<script>

/* GOOGLE SCRIPT URL */

const scriptURL =
'https://script.google.com/macros/s/AKfycbyUyaocO9OPiWv_ThEbgn18dqCRez3jrb2AK049cddsskycOW-J_QTioJ3t0oLEINv-ng/exec'

/* FORM */

const form = document.getElementById('form')
const button = document.getElementById('submitBtn')

/* PLACE TYPE */

const placeType = document.getElementById('placeType')

const villageBox = document.getElementById('villageBox')
const cityBox = document.getElementById('cityBox')

/* DEFAULT */

villageBox.style.display = 'none'
cityBox.style.display = 'none'

/* SWITCH */

placeType.addEventListener('change',()=>{

if(placeType.value === 'Ауыл'){

villageBox.style.display = 'block'
cityBox.style.display = 'none'

}

else if(placeType.value === 'Қала'){

cityBox.style.display = 'block'
villageBox.style.display = 'none'

}

else{

villageBox.style.display = 'none'
cityBox.style.display = 'none'

}

})

/* SEND */

form.addEventListener('submit',(e)=>{

e.preventDefault()

button.innerText = 'ЖІБЕРІЛУДЕ...'
button.disabled = true

fetch(scriptURL,{
method:'POST',
body:new FormData(form)
})

.then(()=>{

alert('Сәтті жіберілді 🚀')

form.reset()

villageBox.style.display = 'none'
cityBox.style.display = 'none'

})

.catch(()=>{

alert('Қате шықты ❌')

})

.finally(()=>{

button.innerText = 'ЖІБЕРУ'
button.disabled = false

})

})

</script>
